<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutesy Warning Page</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            background-color: #ffdb58; /* Pastel yellow background */
            margin: 0;
            padding: 0;
        }

        .warning {
            background-color: #ff9999; /* Pastel pink warning box */
            padding: 20px;
            border: 2px solid #ff4d4d; /* Lighter pink border */
            border-radius: 15px;
            margin: 50px auto;
            max-width: 80%;
        }

        h1 {
            font-size: 36px;
            color: #ff4d4d; /* Lighter pink for the title */
        }

        p {
            font-size: 18px;
            color: #333; /* Dark gray text */
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff4d4d; /* Lighter pink button */
            color: #fff; /* White text */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #ff6666; /* Slightly darker pink on hover */
        }
    </style>
</head>
<body>
    <div class="warning">
        <h1>warning!</h1>
        <p>this journal is very vent-y!!</p>
        <p>tw: suicide ideation, self-harm mentions, etc.</p>
        <button id="proceedButton">proceed</button>
    </div>

    <script>
        document.getElementById("proceedButton").addEventListener("click", function () {
            // Redirect to another page when the button is clicked
            window.location.href = "blog.html";
        });
    </script>
</body>
</html>
